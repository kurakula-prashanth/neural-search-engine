version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - HF_API_TOKEN=${HF_API_TOKEN}
    volumes:
      - ./backend:/app
      - /app/venv # prevent host venv from being used in container
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
